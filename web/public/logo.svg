  <!-- Roof -->
  <polygon points="30,35 50,15 70,35" fill="none" stroke="#667eea" stroke-width="2"/>
  
  <!-- Flag on roof -->
  <line x1="50" y1="15" x2="50" y2="5" stroke="#667eea" stroke-width="2"/>
  <polygon points="50,5 55,10 50,12" fill="#667eea"/>
  
  <!-- Windows -->
  <rect x="35" y="40" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <rect x="46" y="40" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <rect x="57" y="40" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  
  <rect x="35" y="51" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <rect x="46" y="51" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <rect x="57" y="51" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  
  <rect x="35" y="62" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <rect x="46" y="62" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <rect x="57" y="62" width="8" height="8" fill="none" stroke="#667eea" stroke-width="1.5"/>
  
  <!-- Door -->
  <rect x="46" y="70" width="8" height="10" fill="none" stroke="#667eea" stroke-width="1.5"/>
  <circle cx="53" cy="75" r="1" fill="#667eea"/>
</svg>